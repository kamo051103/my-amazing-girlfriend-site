<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Birthday</title>

<style>
body {
    margin:0;
    background:#ffe6ec;
    overflow:hidden;
}

/* Back button */
#back {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    padding: 12px 20px;
    background: #ff4d6d;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    z-index: 1000;
}

/* ADD THIS BELOW */
#birthday-wheel {
    position: absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

.center-text {
    position: absolute;
    font-size: 34px;
    color: #ff4d6d;
    font-weight: bold;
    z-index: 2;
    animation: heartbeat 1.5s infinite;
}

/* Heartbeat effect */
@keyframes heartbeat {
    0%   { transform: scale(1); }
    14%  { transform: scale(1.15); }
    28%  { transform: scale(1); }
    42%  { transform: scale(1.15); }
    70%  { transform: scale(1); }
}

.wheel {
    position: relative;
    width: 500px;   /* bigger circle */
    height: 500px;
	box-shadow: 0 0 60px rgba(255, 77, 109, 0.2);
	border-radius: 50%;
}

/* All images stacked in same spot */
.wheel img {
    position: absolute;
    width: 100px;
    height: 100px;
    border-radius: 15px;
    opacity: 0;
    transform: scale(0.9);
    transition: opacity 1.5s ease-in-out, transform 1.5s ease-in-out;
	filter: brightness(1.1) contrast(1.1) saturate(1.2);
}

/* Position images in a PERFECT circle */
.wheel img:nth-child(1){ top:0px; left:200px; }
.wheel img:nth-child(2){ top:60px; left:340px; }
.wheel img:nth-child(3){ top:180px; left:400px; }
.wheel img:nth-child(4){ top:320px; left:340px; }
.wheel img:nth-child(5){ top:400px; left:200px; }
.wheel img:nth-child(6){ top:320px; left:60px; }
.wheel img:nth-child(7){ top:180px; left:0px; }
.wheel img:nth-child(8){ top:60px; left:60px; }
.wheel img:nth-child(9){ top:120px; left:200px; } 

/* Visible image */
.wheel img.active {
    opacity: 1;
    transform: scale(1.2);
    box-shadow: 0 0 20px rgba(255, 77, 109, 0.8);
}

#hearts-container .heart {
    position:absolute;
    width:60px;
    height:60px;
    background:red;
    transform:rotate(-45deg);
    opacity:0.4;
    border-radius:5px;
    pointer-events:none;
    z-index:1;
}
#hearts-container .heart:before,
#hearts-container .heart:after {
    content:"";
    position:absolute;
    width:60px;
    height:60px;
    background:red;
    border-radius:50%;
}
#hearts-container .heart:before { top:-30px; left:0; }
#hearts-container .heart:after { left:30px; top:0; }

#confetti-canvas {
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    pointer-events:none;
    z-index:2; /* above hearts, below center text and photos */
}

</style>
</head>
<body>

<button id="back">⬅ Back</button>
<canvas id="matrix"></canvas>

<!-- ADD THIS HERE -->
<div id="birthday-wheel" style="display:none;">
    <div class="center-text">Happy Birthday Baby </div>
	
	<div id="hearts-container"></div>
    <canvas id="confetti-canvas"></canvas>
	
    <div class="wheel">
        <img src="Photo1.jpeg">
        <img src="Photo2.jpeg">
        <img src="Photo3.jpeg">
        <img src="Photo4.jpeg">
        <img src="Photo5.jpeg">
        <img src="Photo6.jpeg">
        <img src="Photo7.jpeg">
        <img src="Photo8.jpeg">
        <img src="Photo9.jpeg">
    </div>
</div>

<script>
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// Countdown words
const countdownWords = ["3", "2", "1", "happy", "Birthday", "Zodwa"];
const countdownFontSize = 80; 
let countdownIndex = 0;
let countdownOpacity = 0;
let fadingIn = true;

// MATRIX EFFECT WORDS
const matrixWords = ["I love you","Zodwa Mthombeni","You are the best"];
const matrixFontSize = 24;
const columns = Math.floor(canvas.width / matrixFontSize);
const drops = Array(columns).fill(0);

// Draw matrix + countdown
function drawMatrix() {
    // Matrix background
    ctx.fillStyle = "rgba(255,230,236,0.1)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Matrix letters
    ctx.fillStyle = "#ff4d6d";
    ctx.font = matrixFontSize + "px monospace";
    for(let i=0;i<drops.length;i++){
        const text = matrixWords[Math.floor(Math.random()*matrixWords.length)];
        ctx.fillText(text, i*matrixFontSize, drops[i]*matrixFontSize);

        if(drops[i]*matrixFontSize > canvas.height && Math.random() > 0.975){
            drops[i] = 0;
        }
        drops[i]++;
    }

    // Countdown on top in black with fade
    if(countdownIndex < countdownWords.length){
        ctx.font = `${countdownFontSize}px monospace`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillStyle = `rgba(0,0,0,${countdownOpacity})`;
        ctx.fillText(countdownWords[countdownIndex], canvas.width/2, canvas.height/2);

        if(fadingIn){
            countdownOpacity += 0.05; // fade in speed
            if(countdownOpacity >= 1) fadingIn = false;
        } else {
            countdownOpacity -= 0.05; // fade out speed
            if(countdownOpacity <= 0){
				fadingIn = true;
				countdownIndex++;

				// When countdown finishes
				if(countdownIndex >= countdownWords.length){
					document.getElementById("birthday-wheel").style.display = "flex";
					canvas.style.display = "none";
					startSlideshow(); 
				}
			}
        }
    }
}

// Start animation
setInterval(drawMatrix, 50);

// Resize handling
window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});

const images = document.querySelectorAll(".wheel img");
let current = 0;

function startSlideshow() {
    images[current].classList.add("active");

    setInterval(() => {
        const prev = current;
        current = (current + 1) % images.length;

        // show next BEFORE removing previous (smooth crossfade)
        images[current].classList.add("active");

        setTimeout(() => {
            images[prev].classList.remove("active");
        }, 400); // slight overlap
        
    }, 2200);
}

// Back button
document.getElementById("back").onclick = () => {
   window.location.href = "index.html#main";
};

// FLOATING HEARTS
function startFloatingHearts(count = 12){
    const container = document.getElementById("hearts-container");
    for(let i=0;i<count;i++){
        const h = document.createElement("div");
        h.className = "heart";
        container.appendChild(h);

        h.style.left = Math.random()*window.innerWidth + "px";
        h.style.top = Math.random()*window.innerHeight + "px";

        let dx = (Math.random()-0.5) * 0.5;
        let dy = (Math.random()-0.5) * 0.3;

        function moveHeart(){
            let x = parseFloat(h.style.left);
            let y = parseFloat(h.style.top);
            x += dx;
            y += dy;
            if(x<0 || x>window.innerWidth-60) dx*=-1;
            if(y<0 || y>window.innerHeight-60) dy*=-1;
            h.style.left = x+"px";
            h.style.top = y+"px";
            requestAnimationFrame(moveHeart);
        }
        moveHeart();
    }
}

// CONFETTI
function startConfetti(){
    const canvas = document.getElementById("confetti-canvas");
    const ctx = canvas.getContext("2d");
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const confettiCount = 150;
    const confetti = [];

    for(let i=0;i<confettiCount;i++){
        confetti.push({
            x: Math.random()*canvas.width,
            y: Math.random()*canvas.height,
            r: Math.random()*6 + 4,
            d: Math.random()*confettiCount,
            color: `hsl(${Math.random()*360}, 70%, 60%)`,
            tilt: Math.random()*10 - 10,
            tiltAngleIncrement: Math.random()*0.07 + 0.05,
            tiltAngle: 0
        });
    }

    function draw(){
        ctx.clearRect(0,0,canvas.width,canvas.height);
        confetti.forEach((c,i)=>{
            c.tiltAngle += c.tiltAngleIncrement;
            c.y += (Math.cos(c.d) + 3 + c.r/2)/2;
            c.x += Math.sin(c.tiltAngle) * 2;
            c.tilt = Math.sin(c.tiltAngle) * 15;

            ctx.beginPath();
            ctx.lineWidth = c.r;
            ctx.strokeStyle = c.color;
            ctx.moveTo(c.x + c.tilt + c.r/2, c.y);
            ctx.lineTo(c.x + c.tilt, c.y + c.tilt + c.r/2);
            ctx.stroke();

            if(c.y > canvas.height) {
                confetti[i] = {
                    x: Math.random()*canvas.width,
                    y: -10,
                    r: c.r,
                    d: c.d,
                    color: c.color,
                    tilt: c.tilt,
                    tiltAngleIncrement: c.tiltAngleIncrement,
                    tiltAngle: 0
                }
            }
        });
        requestAnimationFrame(draw);
    }
    draw();
}

// START HEARTS + CONFETTI when slideshow starts
function startEffects(){
    startFloatingHearts(12);
    startConfetti();
}

// Call inside startSlideshow after first image shows
startEffects();

</script>
</body>
</html>
