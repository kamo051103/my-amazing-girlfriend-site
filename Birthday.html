<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Birthday</title>

<style>
body {
    margin:0;
    background:#ffe6ec;
    overflow:hidden;
}

/* Back button */
#back {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    padding: 12px 20px;
    background: #ff4d6d;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    z-index: 1000;
}

/* ADD THIS BELOW */
#birthday-wheel {
    position: absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

.center-text {
    position: absolute;
    font-size: 32px;
    color: #ff4d6d;
    font-weight: bold;
    z-index: 2;
}

.wheel {
    position: relative;
    width: 350px;
    height: 350px;
    animation: spin 12s linear infinite;
}

.wheel img {
    position: absolute;
    width: 80px;
    height: 80px;
    border-radius: 15px;
}

.wheel img:nth-child(1){ top:0px; left:135px; }
.wheel img:nth-child(2){ top:40px; left:230px; }
.wheel img:nth-child(3){ top:120px; left:270px; }
.wheel img:nth-child(4){ top:210px; left:230px; }
.wheel img:nth-child(5){ top:270px; left:135px; }
.wheel img:nth-child(6){ top:210px; left:40px; }
.wheel img:nth-child(7){ top:120px; left:0px; }
.wheel img:nth-child(8){ top:40px; left:40px; }
.wheel img:nth-child(9){ top:120px; left:135px; }

@keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

</style>
</head>
<body>

<button id="back">⬅ Back</button>
<canvas id="matrix"></canvas>

<!-- ADD THIS HERE -->
<div id="birthday-wheel" style="display:none;">
    <div class="center-text">Happy Birthday Baby ❤️</div>

    <div class="wheel">
        <img src="Photo1.jpeg">
        <img src="Photo2.jpeg">
        <img src="Photo3.jpeg">
        <img src="Photo4.jpeg">
        <img src="Photo5.jpeg">
        <img src="Photo6.jpeg">
        <img src="Photo7.jpeg">
        <img src="Photo8.jpeg">
        <img src="Photo9.jpeg">
    </div>
</div>

<script>
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// Countdown words
const countdownWords = ["3", "2", "1", "happy", "Birthday", "Zodwa"];
const countdownFontSize = 80; 
let countdownIndex = 0;
let countdownOpacity = 0;
let fadingIn = true;

// MATRIX EFFECT WORDS
const matrixWords = ["I love you","Zodwa Mthombeni","You are the best"];
const matrixFontSize = 24;
const columns = Math.floor(canvas.width / matrixFontSize);
const drops = Array(columns).fill(0);

// Draw matrix + countdown
function drawMatrix() {
    // Matrix background
    ctx.fillStyle = "rgba(255,230,236,0.1)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Matrix letters
    ctx.fillStyle = "#ff4d6d";
    ctx.font = matrixFontSize + "px monospace";
    for(let i=0;i<drops.length;i++){
        const text = matrixWords[Math.floor(Math.random()*matrixWords.length)];
        ctx.fillText(text, i*matrixFontSize, drops[i]*matrixFontSize);

        if(drops[i]*matrixFontSize > canvas.height && Math.random() > 0.975){
            drops[i] = 0;
        }
        drops[i]++;
    }

    // Countdown on top in black with fade
    if(countdownIndex < countdownWords.length){
        ctx.font = `${countdownFontSize}px monospace`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillStyle = `rgba(0,0,0,${countdownOpacity})`;
        ctx.fillText(countdownWords[countdownIndex], canvas.width/2, canvas.height/2);

        if(fadingIn){
            countdownOpacity += 0.05; // fade in speed
            if(countdownOpacity >= 1) fadingIn = false;
        } else {
            countdownOpacity -= 0.05; // fade out speed
            if(countdownOpacity <= 0){
				fadingIn = true;
				countdownIndex++;

				// When countdown finishes
				if(countdownIndex >= countdownWords.length){
					document.getElementById("birthday-wheel").style.display = "flex";
					canvas.style.display = "none"; // 🔥 hide matrix so wheel is visible
				}
			}
        }
    }
}

// Start animation
setInterval(drawMatrix, 50);

// Resize handling
window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});

// Back button
document.getElementById("back").onclick = () => {
   window.location.href = "index.html#main";
};
</script>
</body>
</html>
