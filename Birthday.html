<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Birthday</title>

<style>
body {
    margin:0;
    background:#ffe6ec;
    overflow:hidden;
}

/* Back button */
#back {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    padding: 12px 20px;
    background: #ff4d6d;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    z-index: 1000;
}
</style>
</head>
<body>

<button id="back">⬅ Back</button>
<canvas id="matrix"></canvas>

<script>
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// Countdown words
const countdownWords = ["3", "2", "1", "happy", "Birthday", "Zodwa"];
const countdownFontSize = 80; 
let countdownIndex = 0;

// MATRIX EFFECT WORDS
const matrixWords = ["I love you ❤️","Zodwa Mthombeni","Happy Birthday 🎉","You are the best 💖"];
const matrixFontSize = 24;
const columns = Math.floor(canvas.width / matrixFontSize);
const drops = Array(columns).fill(0);

// Draw matrix
function drawMatrix() {
    ctx.fillStyle = "rgba(255,230,236,0.1)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#ff4d6d";
    ctx.font = matrixFontSize + "px monospace";

    for(let i=0;i<drops.length;i++){
        const text = matrixWords[Math.floor(Math.random()*matrixWords.length)];
        ctx.fillText(text, i*matrixFontSize, drops[i]*matrixFontSize);

        if(drops[i]*matrixFontSize > canvas.height && Math.random() > 0.975){
            drops[i] = 0;
        }
        drops[i]++;
    }

    // Draw countdown on top if still counting
    if(countdownIndex < countdownWords.length){
        ctx.fillStyle = "#ff1a53";
        ctx.font = `${countdownFontSize}px monospace`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(countdownWords[countdownIndex], canvas.width/2, canvas.height/2);
    }
}

// Countdown timer
function startCountdown() {
    const countdownInterval = setInterval(() => {
        countdownIndex++;
        if(countdownIndex >= countdownWords.length){
            clearInterval(countdownInterval);
        }
    }, 1000);
}

// Start everything
startCountdown();
setInterval(drawMatrix, 50);

// Resize handling
window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});

// Back button
document.getElementById("back").onclick = () => {
   window.location.href = "index.html#main";
};
</script>
</body>
</html>
