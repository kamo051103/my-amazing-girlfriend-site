<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: Arial, sans-serif;
    background:#ffe6ec;
    overflow-x:hidden;
}

/* HEART BACKGROUND */
#hearts-bg {
    position:fixed;
    width:100%;
    height:100%;
    top:0;
    left:0;
    z-index:0;
    overflow:hidden;
}

.heart {
    position:absolute;
    width:20px;
    height:20px;
    background:red;
    transform:rotate(-45deg);
    opacity:0.4;
}
.heart:before,
.heart:after {
    content:"";
    position:absolute;
    width:20px;
    height:20px;
    background:red;
    border-radius:50%;
}
.heart:before { top:-10px; left:0; }
.heart:after { left:10px; top:0; }

/* LOGIN */
#login {
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:2;
    position:relative;
}

input, button, textarea {
    padding:10px;
    margin:6px;
    border-radius:8px;
    border:none;
    font-size:16px;
}

button {
    background:#ff4d6d;
    color:white;
    cursor:pointer;
}

/* MAIN */
#main {
    display:none;
    padding:20px;
    position:relative;
    z-index:2;
}

.tabs {
    display:flex;
    flex-direction:column;
    max-width:400px;
}

.tab-btn {
    margin-bottom:10px;
}

/* MESSAGE */
#message-box {
    background:white;
    padding:15px;
    border-radius:10px;
    margin-top:10px;
    white-space:pre-line;
}

/* ADMIN EDIT */
#admin-box {
    display:none;
    margin-top:15px;
}
#admin-box textarea {
    width:100%;
    height:120px;
}

/* IMAGES */
#photos {
    margin-top:20px;
}
#photos img {
    width:100%;
    max-width:400px;
    border-radius:12px;
    margin-bottom:10px;
}

/* PUZZLE */
#puzzle-box {
    margin-top:20px;
    display:none;
    text-align:center;
}
#puzzle-container {
    width:300px;
    height:300px;
    margin:auto;
    position:relative;
}
.tile {
    position:absolute;
    border:1px solid white;
}

/* MOBILE */
@media(max-width:600px){
    #puzzle-container {
        width:90vw;
        height:90vw;
    }
}
</style>
</head>

<body>

<div id="hearts-bg"></div>

<!-- LOGIN -->
<div id="login">
    <h2>Login ❤️</h2>
    <input type="text" id="username" placeholder="Enter name">
    <button onclick="login()">Enter</button>
</div>

<!-- MAIN -->
<div id="main">

    <button onclick="logout()">Logout</button>

    <div class="tabs">
        <button class="tab-btn" onclick="toggleMessage()">Message</button>
        <div id="message-box"></div>

        <div id="admin-box">
            <textarea id="edit-message"></textarea>
            <button onclick="saveMessage()">Save Message</button>
        </div>

        <button class="tab-btn" onclick="togglePuzzle()">Puzzle</button>
    </div>

    <div id="photos">
        <img src="photo.jpg">
        <img src="photo2.jpg">
    </div>

    <div id="puzzle-box">
        <div id="puzzle-container"></div>
        <button onclick="startPuzzle(3)">Start Puzzle</button>
    </div>

</div>

<script>

/* LOGIN SYSTEM */
let isAdmin = false;

function login(){
    const name = document.getElementById("username").value.trim();

    if(name === "Admin"){
        isAdmin = true;
    } else if(name === "Zodwa"){
        isAdmin = false;
    } else {
        alert("Wrong name ❤️");
        return;
    }

    document.getElementById("login").style.display="none";
    document.getElementById("main").style.display="block";

    if(isAdmin){
        document.getElementById("admin-box").style.display="block";
        document.getElementById("edit-message").value = getMessage();
    }

    startHearts();
}

/* LOGOUT */
function logout(){
    location.reload();
}

/* MESSAGE SYSTEM */
function getMessage(){
    return localStorage.getItem("msg") || "I love you ❤️";
}

function toggleMessage(){
    const box = document.getElementById("message-box");
    box.innerText = getMessage();
}

function saveMessage(){
    const text = document.getElementById("edit-message").value;
    localStorage.setItem("msg", text);
    alert("Saved ❤️");
}

/* HEARTS BACKGROUND */
function startHearts(){
    const container = document.getElementById("hearts-bg");

    for(let i=0;i<30;i++){
        const h = document.createElement("div");
        h.className="heart";
        h.style.left = Math.random()*100+"%";
        h.style.top = Math.random()*100+"%";
        container.appendChild(h);

        animateHeart(h);
    }
}

function animateHeart(h){
    let y = Math.random()*window.innerHeight;

    function move(){
        y -= 0.3;
        if(y < -20){
            y = window.innerHeight;
        }
        h.style.top = y + "px";
        requestAnimationFrame(move);
    }
    move();
}

/* PUZZLE */
let size = 3;
let tiles = [];
let empty = {r:2,c:2};

function togglePuzzle(){
    const box = document.getElementById("puzzle-box");
    box.style.display = box.style.display==="block" ? "none" : "block";
}

function startPuzzle(n){
    size = n;
    const container = document.getElementById("puzzle-container");
    container.innerHTML="";
    tiles = [];

    const img = "photo.jpg";
    const width = container.offsetWidth;
    const tileSize = width/size;

    empty = {r:size-1,c:size-1};

    for(let r=0;r<size;r++){
        for(let c=0;c<size;c++){
            if(r===size-1 && c===size-1) continue;

            const t = document.createElement("div");
            t.className="tile";

            t.style.width = tileSize+"px";
            t.style.height = tileSize+"px";
            t.style.top = r*tileSize+"px";
            t.style.left = c*tileSize+"px";

            t.dataset.r = r;
            t.dataset.c = c;
            t.dataset.or = r;
            t.dataset.oc = c;

            t.style.backgroundImage = `url(${img})`;
            t.style.backgroundSize = `${width}px ${width}px`;
            t.style.backgroundPosition = `-${c*tileSize}px -${r*tileSize}px`;

            t.onclick = ()=>moveTile(t);

            container.appendChild(t);
            tiles.push(t);
        }
    }

    shuffle();
}

function shuffle(){
    for(let i=0;i<500;i++){
        const neighbors = tiles.filter(t=>isNeighbor(t));
        const rand = neighbors[Math.floor(Math.random()*neighbors.length)];
        swap(rand);
    }
}

function isNeighbor(t){
    const r = +t.dataset.r;
    const c = +t.dataset.c;
    return (Math.abs(r-empty.r)+Math.abs(c-empty.c))===1;
}

function moveTile(t){
    if(isNeighbor(t)){
        swap(t);
    }
}

function swap(t){
    const width = document.getElementById("puzzle-container").offsetWidth;
    const tileSize = width/size;

    let r = +t.dataset.r;
    let c = +t.dataset.c;

    t.dataset.r = empty.r;
    t.dataset.c = empty.c;

    t.style.top = empty.r*tileSize+"px";
    t.style.left = empty.c*tileSize+"px";

    empty = {r:r,c:c};
}

</script>

</body>
</html>
